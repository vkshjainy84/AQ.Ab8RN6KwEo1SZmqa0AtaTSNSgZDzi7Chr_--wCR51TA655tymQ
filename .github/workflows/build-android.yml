name: Build Android App (APK & AAB)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    name: Build Android Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Sync Web Code into Capacitor Android
        run: npx cap sync android

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew
        working-directory: android

      - name: Compile Debug APK (For Testing)
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Compile Release AAB (For Play Store Upload)
        run: ./gradlew bundleRelease
        working-directory: android

      - name: Upload Test APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clickex-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Play Store AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clickex-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
